<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quilt Playground — expand TypeScript→HTML in the browser</title>
  <link rel="shortcut icon" href="/img/quilt.svg">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: #1a1a1a; display: flex; flex-direction: column; height: 100vh;
           overflow: hidden; color: #ccc; font-family: monospace; }

    /* ── Top bar ── */
    #topbar { display: flex; align-items: center; gap: 12px; padding: 6px 12px;
              background: #222; border-bottom: 1px solid #333; font-size: 12px; flex-wrap: nowrap; }
    #topbar #brand { display: flex; align-items: center; flex-shrink: 0; }
    #topbar #brand img { height: 20px; width: 20px; display: block; }
    #topbar #title { color: #eee; font-weight: bold; white-space: nowrap; }
    #topbar #tagline { color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #topbar code { color: #8fb7ff; }
    #topbar #spacer { flex: 1; }
    #topbar a { color: #8af; text-decoration: none; white-space: nowrap; }
    #topbar a:hover { text-decoration: underline; }
    @media (max-width: 720px) { #topbar #tagline { display: none; } }

    /* ── Split layout ── */
    #layout { display: flex; flex: 1; overflow: hidden; }
    #preview-pane { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    #preview-area { flex: 1; min-height: 0; background: #fff; }
    #preview { width: 100%; height: 100%; border: 0; background: #fff; display: block; }

    #resize-handle { width: 5px; cursor: col-resize; background: #2a2a2a; flex-shrink: 0;
                     border-left: 1px solid #333; border-right: 1px solid #333; }
    #resize-handle:hover, #resize-handle.dragging { background: #555; }

    #editor-pane { width: 50%; min-width: 220px; display: flex; flex-direction: column; }
    #cm-editor { flex: 1; overflow: auto; font-size: 13px; min-height: 0; }
    #expanded-editor { display: none; flex: 1; overflow: auto; font-size: 13px; min-height: 0; }
    .cm-editor { height: 100%; }
    .cm-scroller { overflow: auto; }

    /* ── Compile bar ── */
    #compile-bar { padding: 4px 8px; background: #222; border-top: 1px solid #333; font-size: 12px;
                   display: flex; align-items: center; gap: 6px; }
    #compile-status { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #compile-status.ok   { color: #8f8; }
    #compile-status.err  { color: #f88; }
    #compile-status.busy { color: #fa8; }

    button { background: #333; color: #ccc; border: 1px solid #555; border-radius: 4px;
             padding: 3px 10px; font-family: monospace; font-size: 12px; cursor: pointer; }
    button:hover { background: #444; }
    button:disabled { opacity: 0.4; cursor: default; }
    button.active { background: #2a4a2a; border-color: #4a8; color: #8f8; }

    /* Arrow-glyph inserters (the glyphs can't be typed). Colours match the
       site's per-glyph syntax palette. */
    #glyphs { display: flex; gap: 3px; }
    #glyphs button { padding: 3px 7px; font-weight: 700; }
    #glyphs .g-quote   { color: #f97316; }
    #glyphs .g-unquote { color: #60a5fa; }
    #glyphs .g-lift    { color: #facc15; }
    #glyphs .g-reduce  { color: #c084fc; }
    #glyphs .g-emit    { color: #34d399; }

    @media (orientation: portrait) {
      #layout { flex-direction: column; }
      #preview-pane { flex: none; height: 45vh; }
      #editor-pane { width: 100% !important; flex: 1; min-width: 0; }
      #resize-handle { width: auto; height: 5px; cursor: row-resize;
                       border-left: none; border-right: none;
                       border-top: 1px solid #333; border-bottom: 1px solid #333; }
    }
  </style>

  <!-- The CodeMirror 6 bundle (global `cm6`), same editor the nanobots demo uses. -->
  <script src="./codemirror.min.js"></script>

  <!-- Resolve the bare `quilt` specifier — used both here and inside the
       expanded program when it is imported — to the runtime built with
       `wasm-pack build quilt-wasm --target web`. (The npm package is
       published as `quilt-wasm`; this maps it to the bare `quilt` name.) -->
  <script type="importmap">
  { "imports": { "quilt": "./quilt-wasm/quilt_wasm.js" } }
  </script>
</head>
<body>
  <div id="topbar">
    <a id="brand" href="/" title="quiltlang.github.io"><img src="/img/quilt.svg" alt="Quilt" /></a>
    <span id="title">Quilt Playground</span>
    <span id="tagline">expand <code>.html.ts.quilt</code> &rarr; TypeScript &rarr; HTML, entirely in the browser</span>
    <span id="spacer"></span>
    <a href="https://github.com/QuiltLang/quilt/tree/main/examples/web">source</a>
  </div>

  <div id="layout">
    <div id="preview-pane">
      <div id="preview-area">
        <iframe id="preview" sandbox="allow-same-origin" title="rendered output"></iframe>
      </div>
    </div>
    <div id="resize-handle"></div>
    <div id="editor-pane">
      <div id="cm-editor"></div>
      <div id="expanded-editor"></div>
      <div id="compile-bar">
        <span id="compile-status">Initialising…</span>
        <span id="glyphs">
          <button type="button" class="g-quote"   data-wrap="↖↗" title="quote ↖…↗  (⌘/Ctrl+2 then up,left / up,right)">↖↗</button>
          <button type="button" class="g-unquote" data-wrap="↙↘" title="unquote ↙…↘  (⌘/Ctrl+2 then down,left / down,right)">↙↘</button>
          <button type="button" class="g-lift"    data-ins="↑"   title="lift ↑  (⌘/Ctrl+1 then up)">↑</button>
          <button type="button" class="g-reduce"  data-ins="↓"   title="reduce ↓  (⌘/Ctrl+1 then down)">↓</button>
          <button type="button" class="g-emit"    data-ins="←"   title="emit ←  (⌘/Ctrl+1 then left)">←</button>
        </span>
        <button id="btn-run" title="Expand &amp; run the source (⌘/Ctrl+Enter)">Run</button>
        <button id="btn-ts" title="Show the expanded TypeScript">TS</button>
        <button id="btn-auto" class="active" title="Auto expand &amp; run on edit">Auto</button>
      </div>
    </div>
  </div>

  <script type="module" src="./playground.js"></script>
</body>
</html>
