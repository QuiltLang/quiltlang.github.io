<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quilt Playground — expand TypeScript→HTML in the browser</title>
  <link rel="shortcut icon" href="/img/quilt.svg">
  <!-- Shared site theme: pulls in the GitHub-dark brand palette + per-glyph
       colours as CSS variables, so the chrome below matches the rest of the
       site. (Its preview `body`/`.card` rules don't apply here — the chrome
       `body` rule overrides them, and the cards only exist in the iframe.) -->
  <link rel="stylesheet" href="./theme.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    /* Override theme.css's preview `body` rule (it styles the rendered cards,
       not this app) so the chrome stays full-bleed and dark — including its
       margin/padding, or the app would inherit the preview's 1.5rem inset. */
    body { background: var(--quilt-bg); margin: 0; padding: 0; display: flex; flex-direction: column;
           height: 100vh; overflow: hidden; color: var(--quilt-text); font-family: monospace; }

    /* ── Top bar ── */
    #topbar { display: flex; align-items: center; gap: 12px; padding: 6px 12px;
              background: var(--quilt-surface); border-bottom: 1px solid var(--quilt-border);
              font-size: 12px; flex-wrap: nowrap; }
    #topbar #brand { display: flex; align-items: center; flex-shrink: 0; }
    #topbar #brand img { height: 20px; width: 20px; display: block; }
    #topbar #title { color: var(--quilt-heading); font-weight: bold; white-space: nowrap; }
    #topbar #tagline { color: var(--quilt-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #topbar code { color: var(--tok-type); }
    #topbar #spacer { flex: 1; }
    #topbar a { color: var(--quilt-orange-2); text-decoration: none; white-space: nowrap; }
    #topbar a:hover { text-decoration: underline; }
    @media (max-width: 720px) { #topbar #tagline { display: none; } }

    /* ── Split layout ── */
    #layout { display: flex; flex: 1; overflow: hidden; }
    #preview-pane { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    #preview-area { flex: 1; min-height: 0; background: var(--quilt-bg); }
    #preview { width: 100%; height: 100%; border: 0; background: var(--quilt-bg); display: block; }

    /* ── Config panel (schema + opts JSON, edited by the user) above the dashboard.
       Half the height of the left side; same CodeMirror editor as the source. ── */
    #config-pane { display: flex; flex-direction: column; flex: 1; min-height: 0;
                   border-bottom: 1px solid var(--quilt-border); }
    #config-label { font-size: 11px; color: var(--quilt-muted); padding: 4px 8px; flex-shrink: 0;
                    background: var(--quilt-surface); border-bottom: 1px solid var(--quilt-border); }
    #config-label b { color: var(--tok-type); font-weight: 600; }
    #config-editor { flex: 1; overflow: auto; font-size: 13px; min-height: 0; }
    #config-editor.err { box-shadow: inset 0 0 0 2px #f88; }

    #resize-handle { width: 5px; cursor: col-resize; background: var(--quilt-elevated); flex-shrink: 0;
                     border-left: 1px solid var(--quilt-border); border-right: 1px solid var(--quilt-border); }
    #resize-handle:hover, #resize-handle.dragging { background: var(--quilt-orange); }

    #editor-pane { width: 50%; min-width: 220px; display: flex; flex-direction: column; }
    #cm-editor { flex: 1; overflow: auto; font-size: 13px; min-height: 0; }
    #expanded-editor { display: none; flex: 1; overflow: auto; font-size: 13px; min-height: 0; }
    .cm-editor { height: 100%; }
    .cm-scroller { overflow: auto; }

    /* ── Compile bar ── */
    #compile-bar { padding: 4px 8px; background: var(--quilt-surface); border-top: 1px solid var(--quilt-border);
                   font-size: 12px; display: flex; align-items: center; gap: 6px; }
    #compile-status { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #compile-status.ok   { color: #8f8; }
    #compile-status.err  { color: #f88; }
    #compile-status.busy { color: #fa8; }

    button { background: var(--quilt-elevated); color: var(--quilt-text); border: 1px solid var(--quilt-border);
             border-radius: 4px; padding: 3px 10px; font-family: monospace; font-size: 12px; cursor: pointer; }
    button:hover { background: var(--quilt-border); }
    button:disabled { opacity: 0.4; cursor: default; }
    button.active { background: #2a4a2a; border-color: #4a8; color: #8f8; }

    /* Arrow-glyph inserters (the glyphs can't be typed). Colours match the
       site's per-glyph syntax palette. */
    #glyphs { display: flex; gap: 3px; }
    #glyphs button { padding: 3px 7px; font-weight: 700; }
    #glyphs .g-quote   { color: var(--glyph-quote); }
    #glyphs .g-unquote { color: var(--glyph-unquote); }
    #glyphs .g-lift    { color: var(--glyph-lift); }
    #glyphs .g-reduce  { color: var(--glyph-reduce); }
    #glyphs .g-emit    { color: var(--glyph-emit); }

    @media (orientation: portrait) {
      #layout { flex-direction: column; }
      #preview-pane { flex: none; height: 45vh; }
      #editor-pane { width: 100% !important; flex: 1; min-width: 0; }
      #resize-handle { width: auto; height: 5px; cursor: row-resize;
                       border-left: none; border-right: none;
                       border-top: 1px solid var(--quilt-border); border-bottom: 1px solid var(--quilt-border); }
    }
  </style>

  <!-- The CodeMirror 6 bundle (global `cm6`). -->
  <script src="./codemirror.min.js"></script>

  <!-- Resolve the bare specifiers used here AND inside the expanded program when
       it is imported. `quilt` is the reduce-enabled wrapper (quilt-rt.js); it
       re-exports the runtime (published on npm as `quilt-wasm`) and adds the ↓
       operator that runs a generated stage. -->
  <script type="importmap">
  { "imports": {
      "quilt": "./quilt-rt.js",
      "quilt-wasm": "./quilt-wasm/quilt_wasm.js"
  } }
  </script>
</head>
<body>
  <div id="topbar">
    <a id="brand" href="/" title="quiltlang.github.io"><img src="/img/quilt.svg" alt="Quilt" /></a>
    <span id="title">Quilt Playground</span>
    <span id="tagline">TypeScript that writes TypeScript that writes HTML — a staged live dashboard, entirely in the browser</span>
    <span id="spacer"></span>
    <a href="https://github.com/QuiltLang/quilt/tree/main/examples/web">source</a>
  </div>

  <div id="layout">
    <div id="preview-pane">
      <div id="config-pane">
        <div id="config-label"><b>schema &amp; opts</b> (JSON + comments) — edit to regenerate the TypeScript</div>
        <div id="config-editor"></div>
      </div>
      <div id="preview-area">
        <iframe id="preview" sandbox="allow-same-origin" title="rendered output"></iframe>
      </div>
    </div>
    <div id="resize-handle"></div>
    <div id="editor-pane">
      <div id="cm-editor"></div>
      <div id="expanded-editor"></div>
      <div id="compile-bar">
        <span id="compile-status">Initialising…</span>
        <span id="glyphs">
          <button type="button" class="g-quote"   data-wrap="↖↗" title="quote ↖…↗  (⌘/Ctrl+2 then up,left / up,right)">↖↗</button>
          <button type="button" class="g-unquote" data-wrap="↙↘" title="unquote ↙…↘  (⌘/Ctrl+2 then down,left / down,right)">↙↘</button>
          <button type="button" class="g-lift"    data-ins="↑"   title="lift ↑  (⌘/Ctrl+1 then up)">↑</button>
          <button type="button" class="g-reduce"  data-ins="↓"   title="reduce ↓  (⌘/Ctrl+1 then down)">↓</button>
          <button type="button" class="g-emit"    data-ins="←"   title="emit ←  (⌘/Ctrl+1 then left)">←</button>
        </span>
        <button id="btn-run" title="Expand &amp; run the source (⌘/Ctrl+Enter)">Run</button>
        <button id="btn-reconfig" title="Shuffle/drop metrics and rerun Stage 1">Reconfigure ⟳</button>
        <button id="btn-ts" title="Show the start() loop that Stage 1 generated">loop</button>
        <button id="btn-auto" class="active" title="Auto expand &amp; restage on edit">Auto</button>
      </div>
    </div>
  </div>

  <script type="module" src="./playground.js"></script>
</body>
</html>
