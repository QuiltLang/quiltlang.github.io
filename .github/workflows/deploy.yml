name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          path: quiltlang.github.io

      - name: Checkout quilt (wiki docs source)
        uses: actions/checkout@v4
        with:
          repository: QuiltLang/quilt
          path: quilt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: quiltlang.github.io/docs-site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: quiltlang.github.io/docs-site

      - name: Build
        run: npm run build
        working-directory: quiltlang.github.io/docs-site

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quiltlang.github.io/docs-site/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
